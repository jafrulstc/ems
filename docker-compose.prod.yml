# ──────────────────────────────────────────────────────────────────────────────
# EMS — Docker Compose (Production)
#
# Use with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Production overrides:
#   - No volume mounts for source code
#   - Production builds (nginx for frontend)
#   - Restart policies
#   - Resource limits
#   - Environment from .env.docker file
# ──────────────────────────────────────────────────────────────────────────────

services:
  db:
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.25"
    # Don't expose DB port to host in production
    ports: !override []
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      target: runtime
    restart: always
    env_file:
      - .env.docker
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    environment:
      APP_ENV: production
      SEED_DATABASE: "false"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.25"
    # Only expose internally, use reverse proxy in front
    ports: !override []
    volumes: !override []

  frontend:
    build:
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL}
    restart: always
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
        reservations:
          memory: 32M
          cpus: "0.1"
    ports:
      - "80:80"
    volumes: !override []

  minio:
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.25"
    # Don't expose MinIO console in production
    ports:
      - "9000:9000"
    volumes:
      - minio_data:/data
