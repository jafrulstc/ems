# ──────────────────────────────────────────────────────────────────────────────
# EMS — Docker Compose Override (Development)
#
# This file is automatically merged with docker-compose.yml when running
# `docker compose up`. It adds development-specific overrides:
#   - Hot-reload for backend and frontend
#   - Source code volume mounts
#   - Debug port exposure
# ──────────────────────────────────────────────────────────────────────────────

services:
  backend:
    build:
      target: runtime
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
    environment:
      APP_ENV: development
      SEED_DATABASE: ${SEED_DATABASE:-true}
    ports:
      - "8000:8000"
      - "5678:5678"   # Python debugger (debugpy)

  frontend:
    build:
      target: development
    command: pnpm run dev --host 0.0.0.0 --port 3000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
      - "24678:24678"  # Vite HMR WebSocket

volumes:
  backend_venv:
    driver: local
  frontend_node_modules:
    driver: local
